<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}snap-dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body>
<div class="app">
  <header>
    <div class="header-brand">
      <h1><a href="/" class="brand-link">snap-dashboard</a></h1>
      <p>Snap maintenance tracker</p>
    </div>
    <nav class="header-nav">
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/snaps/add" class="nav-link">Add Snap</a>
      <a href="/settings" class="nav-link">Settings</a>
    </nav>
    <div class="last-updated">
      {% if last_run %}
      Updated {{ last_run.strftime('%Y-%m-%d %H:%M') }} UTC
      {% endif %}
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer>
    <p>snap-dashboard &middot; powered by <a href="https://snapcraft.io" target="_blank" rel="noopener">snapcraft.io</a></p>
  </footer>
</div>
</body>
</html>
